<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista 360 - Rincón de Baviera</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.1.4/index.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.1.4/index.min.css" />
    
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #000; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; }

        #global-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: #D4AF37;
            width: 0%;
            z-index: 9999;
            transition: width 0.3s, opacity 0.3s;
            opacity: 0;
            box-shadow: 0 0 10px #D4AF37;
        }
        .header-premium { position: absolute; top: 0; left: 0; width: 100%; padding: 20px 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); color: white; z-index: 10; pointer-events: none; }
        .header-title { font-size: 1.4rem; font-weight: 600; letter-spacing: 2px; color: #D4AF37; text-transform: uppercase; pointer-events: auto; }

        .inventory-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0, 0, 0, 0.8); padding: 12px 25px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.4); z-index: 10; white-space: nowrap; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        @media (max-width: 600px) { .inventory-bar { width: 90%; max-width: 350px; padding: 10px; gap: 10px; border-radius: 12px; overflow-x: auto; justify-content: flex-start; } .inv-item { font-size: 0.75rem; } }
        
        .inv-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #fff; }
        .inv-dot { width: 10px; height: 10px; border-radius: 50%; }
        .inv-count { background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 12px; }

        .lote-marker { width: 34px; height: 34px; border: 2px solid #fff; border-radius: 50%; cursor: pointer; animation: pulse 2s infinite; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        @keyframes pulse-white { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(17, 17, 17, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 16px;
            padding: 25px;
            width: 85%;
            max-width: 320px;
            color: white;
            text-align: center;
            position: relative;
        }
        .btn-close { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; transition: color 0.3s; }
        .btn-close:hover { color: #fff; }

        .modal-title { font-size: 1.5rem; color: #D4AF37; margin: 0 0 5px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .modal-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        .info-box { background: rgba(34, 34, 34, 0.5); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; margin-bottom: 10px; text-align: center; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #D4AF37;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }
        
        .input-glass {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.3s, background 0.3s;
        }
        .input-glass:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(0, 0, 0, 0.5);
        }
        .btn-whatsapp { display: block; padding: 15px; background: #25D366; color: white; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 15px; text-transform: uppercase; font-size: 0.9rem; }

        #preloader { position: fixed; inset: 0; background: #050505; z-index: 10000; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
        .preloader-content { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #preloader-logo { max-height: 120px; max-width: 80vw; object-fit: contain; animation: logo-pulse 2s infinite; border-radius: 8px; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(212, 175, 55, 0.3); border-top-color: #D4AF37; border-radius: 50%; animation: spin 1s linear infinite; }
        .preloader-text { color: #D4AF37; font-size: 1.1rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; animation: logo-pulse 2s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes logo-pulse { 0% { opacity: 0.7; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.7; transform: scale(0.98); } }
    </style>
</head>
<body>
    <div id="preloader">
        <video id="preloader-video" autoplay loop muted playsinline style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; display: none;"></video>
        <img id="preloader-bg-img" src="" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; display: none;">
        <div class="preloader-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 0;"></div>
        <div class="preloader-content" style="position: relative; z-index: 1;">
            <img id="preloader-logo" src="" alt="Logo" style="display:none;">
            <div class="spinner"></div>
            <div class="preloader-text">Cargando entorno 360...</div>
        </div>
    </div>

    <div id="global-progress"></div>

    <div class="header-premium">
        <div class="header-title" style="display: flex; align-items: center; gap: 10px;">
            <img id="display-logo" style="height: 40px; border-radius: 4px; display: none;">
            <span id="display-title">Cargando...</span>
        </div>
    </div>

    <div class="inventory-bar">
        <div class="inv-item"><span class="inv-dot" style="background:#2ecc71"></span> Disp: <span class="inv-count" id="count-disp">0</span></div>
        <div class="inv-item"><span class="inv-dot" style="background:#f39c12"></span> Resrv: <span class="inv-count" id="count-res">0</span></div>
        <div class="inv-item"><span class="inv-dot" style="background:#e74c3c"></span> Vend: <span class="inv-count" id="count-vend">0</span></div>
    </div>

    <div id="btn-back-main" style="display:none; position: fixed; top: 80px; left: 20px; z-index: 100; cursor: pointer; background: rgba(17,17,17,0.7); backdrop-filter: blur(10px); border: 1px solid #D4AF37; color: #fff; padding: 10px 15px; border-radius: 8px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); align-items: center; gap: 8px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'" onclick="volverVistaPrincipal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Volver a Vista Principal
    </div>

    <div id="viewer"></div>

    <div id="premium-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="btn-close" onclick="cerrarModal()">&times;</button>
            <h2 class="modal-title" id="m-titulo">Lote</h2>
            <div class="modal-badge" id="m-estado">Estado</div>
            <div class="info-box">Área: <strong id="m-area">0</strong><br>Precio: <strong id="m-precio">0</strong></div>
            <button class="btn-whatsapp" style="background: #D4AF37; color: #000; border: none; width: 100%; cursor: pointer;" id="m-simular">Simular Financiamiento</button>
            <a href="#" target="_blank" class="btn-whatsapp" id="m-whatsapp">Contactar por WhatsApp</a>
        </div>
    </div>

    <!-- Modal Simulador -->
    <div id="simulador-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; max-height: 90vh; overflow-y: auto;">
            <button class="btn-close" onclick="cerrarSimulador()">&times;</button>
            <h2 class="modal-title" style="font-size: 1.3rem;">Simulador de Pagos</h2>
            <h3 id="sim-lote-nombre" style="margin-top: 5px; color: #fff; font-size: 1.1rem;">Lote</h3>
            <div class="info-box" style="margin-bottom: 20px;">
                Valor Total: <strong id="sim-valor-total" style="color: #D4AF37; font-size: 1.2rem;">$0</strong>
            </div>

            <div style="text-align: left; font-size: 0.85rem; margin-bottom: 15px;">
                <label style="color: #ddd; font-weight: 600; margin-bottom: 5px; display: block;">Datos del Asesor (Autoguardado)</label>
                <input type="text" id="sim-asesor-nombre" class="input-glass" placeholder="Tu Nombre (Asesor)" style="margin-bottom: 8px;" onchange="guardarDatosAsesor()">
                <input type="text" id="sim-asesor-tel" class="input-glass" placeholder="Tu Celular (Asesor)" style="margin-bottom: 5px;" onchange="guardarDatosAsesor()">
            </div>

            <div style="text-align: left; font-size: 0.85rem; margin-bottom: 15px;">
                <label style="color: #ddd; font-weight: 600; margin-bottom: 5px; display: block;">Datos del Cliente</label>
                <input type="text" id="sim-cliente-nombre" class="input-glass" placeholder="Nombre del Cliente" style="margin-bottom: 8px;">
                <input type="text" id="sim-cliente-tel" class="input-glass" placeholder="Celular" style="margin-bottom: 8px;">
                <input type="text" id="sim-cliente-email" class="input-glass" placeholder="Correo Electrónico" style="margin-bottom: 8px;">
                <input type="text" id="sim-cliente-dir" class="input-glass" placeholder="Dirección" style="margin-bottom: 5px;">
            </div>

            <div style="text-align: left; font-size: 0.85rem; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.2);">
                <label style="color: #D4AF37; font-weight: 600; margin-bottom: 10px; display: block; font-size: 0.95rem; text-align: center;">Plan de Financiación</label>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label style="margin: 0;">Cuota Inicial ($)</label>
                    <span id="lbl-cuota-inicial-pct" style="color: #D4AF37; font-weight: bold; font-size: 0.8rem;">30%</span>
                </div>
                <input type="number" id="sim-cuota-inicial" class="input-glass" step="500000" style="margin-bottom: 10px; border-color: rgba(212, 175, 55, 0.5);" oninput="sincronizarRangoCuota()">
                <input type="range" id="sim-rango-cuota" min="0" max="100" value="30" step="500000" oninput="sincronizarInputCuota()" style="margin-bottom: 15px;">

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label style="margin: 0;">Plazo de Financiación</label>
                    <span id="lbl-meses" style="color: #D4AF37; font-weight: bold; font-size: 0.8rem;">12 Meses</span>
                </div>
                <input type="range" id="sim-meses-rango" min="1" max="24" value="12" oninput="sincronizarMeses()" style="margin-bottom: 10px;">
                <input type="hidden" id="sim-meses" value="12">
            </div>

            <div class="info-box" style="margin-bottom: 20px; text-align: left;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>Saldo a Financiar:</span>
                    <strong id="sim-saldo">$0</strong>
                </div>
                <div style="display: flex; justify-content: space-between; color: #D4AF37; font-size: 1.1rem; border-top: 1px solid #444; padding-top: 5px; margin-top: 5px;">
                    <span>Valor Cuota Mensual:</span>
                    <strong id="sim-cuota-mensual">$0</strong>
                </div>
            </div>

            <button class="btn-whatsapp" style="background: #e74c3c; color: white; border: none; width: 100%; cursor: pointer;" onclick="generarPDF()">Generar PDF (Cotización)</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.1.4/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.1.4/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        window.mostrarProgreso = function(porcentaje) {
            const bar = document.getElementById('global-progress');
            if (!bar) return;
            bar.style.opacity = '1';
            bar.style.width = porcentaje + '%';
            if (porcentaje >= 100) {
                setTimeout(() => {
                    bar.style.opacity = '0';
                    setTimeout(() => { bar.style.width = '0%'; }, 300);
                }, 500);
            }
        };

        window.mostrarError = function(contexto, err) {
            window.mostrarProgreso(100);
            const preloader = document.getElementById('preloader');
            if (preloader) preloader.style.display = 'none';
            console.error("Error en " + contexto + ":", err);
            const msg = err && err.message ? err.message : String(err);
            const titleElement = document.getElementById('display-title');
            if(titleElement) {
                titleElement.innerText = "Error en " + contexto + ": " + msg;
                titleElement.style.color = "#ff4444";
            }
            alert("Error en " + contexto + ":\n" + msg);
        }

        // CAZADOR DE ERRORES GLOBALES
        window.onerror = function(msg, url, line) {
            window.mostrarError("Global", "Línea " + line + " - " + msg);
            return false;
        };

        window.addEventListener('unhandledrejection', function(event) {
            window.mostrarError("Promesa Rechazada", event.reason);
        });

        const supabaseUrl = 'https://mungbffwwjobinfcympd.supabase.co';
        const supabaseKey = 'sb_publishable_yW5gsHp1w8ElbWRTeoMJYw_ZC-u0j9e';
        
        let supabaseClient;
        let viewer, markersPlugin;
        const fallbackImage = 'https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg';
        let globalPanoUrl = fallbackImage;
        let configuracionCuotaInicial = 30; // Valor por defecto
        let globalTituloColor = '#D4AF37';
        let globalTituloFont = 'Montserrat';

        async function initClient() {
            let panoUrl = fallbackImage;
            let titulo = "Rincón de Baviera";
            let logoUrl = "";
            let preloaderUrl = "";

            try {
                if (!window.supabase) throw new Error("Base de datos no cargada");
                if (!window.PhotoSphereViewer) throw new Error("Visor 360 no cargado");

                supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

                try {
                    const { data: config, error: configError } = await supabaseClient.from('configuracion').select('*').eq('id', 1).maybeSingle();
                    if (configError) throw new Error(configError.message);
                    if (config) {
                        if (config.imagen_url) {
                            panoUrl = config.imagen_url;
                            globalPanoUrl = panoUrl;
                        }
                        if (config.cuota_inicial !== undefined && config.cuota_inicial !== null) {
                            configuracionCuotaInicial = config.cuota_inicial;
                        }
                        if (config.titulo) {
                            let tempTitulo = config.titulo;

                            const extractValue = (str, prefix) => {
                                if (str.includes(`|${prefix}:`)) {
                                    let parts = str.split(`|${prefix}:`);
                                    let val = parts[1];
                                    if (val.includes('|')) {
                                        val = val.split('|')[0];
                                    }
                                    return val;
                                }
                                return "";
                            };

                            const removeValue = (str, prefix) => {
                                if (str.includes(`|${prefix}:`)) {
                                    let regex = new RegExp(`\\|${prefix}:[^\\|]*`);
                                    return str.replace(regex, '');
                                }
                                return str;
                            };

                            const loadedPreloader = extractValue(tempTitulo, "PRELOADER");
                            if (loadedPreloader) {
                                preloaderUrl = loadedPreloader;
                            }
                            tempTitulo = removeValue(tempTitulo, "PRELOADER");

                            logoUrl = extractValue(tempTitulo, "LOGO");
                            tempTitulo = removeValue(tempTitulo, "LOGO");

                            globalTituloFont = extractValue(tempTitulo, "FONT");
                            tempTitulo = removeValue(tempTitulo, "FONT");

                            globalTituloColor = extractValue(tempTitulo, "COLOR");
                            tempTitulo = removeValue(tempTitulo, "COLOR");
                            
                            titulo = tempTitulo;
                            
                        }
                    }
                } catch (dbError) {
                    console.warn("No se pudo cargar la configuración de Supabase. Usando valores por defecto.", dbError);
                    window.mostrarError("Conexión BD", dbError);
                }

                if (preloaderUrl) {
                    const isVideo = preloaderUrl.match(/\.(mp4|webm|ogg)(?:\?.*)?$/i);
                    const preloaderImg = document.getElementById('preloader-bg-img');
                    const preloaderVideo = document.getElementById('preloader-video');
                    if (isVideo) {
                        preloaderImg.style.display = 'none';
                        preloaderVideo.src = preloaderUrl;
                        preloaderVideo.style.display = 'block';
                    } else {
                        preloaderVideo.style.display = 'none';
                        preloaderImg.src = preloaderUrl;
                        preloaderImg.style.display = 'block';
                    }
                }

                document.getElementById('display-title').innerText = titulo;
                document.getElementById('display-title').style.color = globalTituloColor;
                document.getElementById('display-title').style.fontFamily = globalTituloFont;
                if (logoUrl) {
                    document.getElementById('display-logo').src = logoUrl;
                    document.getElementById('display-logo').style.display = 'block';
                    const plogo = document.getElementById('preloader-logo');
                    if (plogo) {
                        plogo.src = logoUrl;
                        plogo.style.display = 'block';
                    }
                } else {
                    document.getElementById('display-logo').style.display = 'none';
                }

                viewer = new PhotoSphereViewer.Viewer({
                    container: document.querySelector('#viewer'),
                    panorama: panoUrl, 
                    touchmoveTwoFingers: false, mousewheelCtrlKey: false,
                    defaultYaw: '0deg', defaultPitch: '0deg',
                    defaultZoomLvl: 0,
                    navbar: false,
                    plugins: [ [PhotoSphereViewer.MarkersPlugin, { markers: [] }] ]
                });

                markersPlugin = viewer.getPlugin(PhotoSphereViewer.MarkersPlugin);

                viewer.addEventListener('ready', async () => {
                    await cargarDatosPublicos();
                    const preloader = document.getElementById('preloader');
                    if (preloader) {
                        preloader.style.opacity = '0';
                        setTimeout(() => preloader.style.display = 'none', 800);
                    }

                    // Auto-rotación inicial
                    viewer.animate({
                        yaw: viewer.getPosition().yaw + 0.5,
                        pitch: viewer.getPosition().pitch,
                        speed: "1rpm"
                    }).then(() => {
                        // Se detiene al llegar o si el usuario interactúa
                    });

                });

            } catch (error) {
                window.mostrarError("initClient", error);
            }
        }

        async function cargarDatosPublicos() {
            try {
                if (!supabaseClient) return;
                const { data: lotes, error: lotesError } = await supabaseClient.from('lotes').select('*');
                if (lotesError) throw lotesError;

                let disp = 0, res = 0, vend = 0;

                const activeMarkers = new Set();

                if (lotes) {
                    lotes.forEach(l => {
                        activeMarkers.add(l.id);
                        let bg = l.estado === 'Vendido' ? 'rgba(231,76,60,0.9)' : (l.estado === 'Reservado' ? 'rgba(243,156,18,0.9)' : 'rgba(46,204,113,0.9)');
                        let shadow = l.estado === 'Vendido' ? '#e74c3c' : (l.estado === 'Reservado' ? '#f39c12' : '#2ecc71');

                        if(l.estado === 'Vendido') vend++; else if(l.estado === 'Reservado') res++; else disp++;

                        let shortName = l.nombre.replace(/lote\s*/i, '').trim();
                        if(shortName.length > 4) shortName = shortName.substring(0, 4);

                        const htmlContent = `<div class="lote-marker" style="background:${bg}; box-shadow: 0 0 15px ${shadow}">${shortName}</div>`;

                        let markerConfigHTML = {
                            id: l.id,
                            position: { yaw: l.yaw, pitch: l.pitch },
                            html: htmlContent,
                            size: { width: 34, height: 34 },
                            anchor: 'center center',
                            data: { type: 'lote', nombre: l.nombre, area: l.area + ' m²', precio: l.precio, estado: l.estado }
                        };

                        if (markersPlugin.markers[l.id]) {
                            markersPlugin.removeMarker(l.id);
                        }
                        markersPlugin.addMarker(markerConfigHTML);

                        let polyId = l.id + '_poly';
                        if (l.poligono) {
                            try {
                                const polyPoints = JSON.parse(l.poligono);
                                if (Array.isArray(polyPoints) && polyPoints.length >= 3) {
                                    let markerConfigPoly = {
                                        id: polyId,
                                        polygon: polyPoints,
                                        svgStyle: {
                                            fill: bg.replace('0.9', '0.4'), // Más transparente
                                            stroke: shadow,
                                            strokeWidth: '2px'
                                        },
                                        data: { type: 'lote_poly', parentId: l.id }
                                    };
                                    if (markersPlugin.markers[polyId]) {
                                        markersPlugin.removeMarker(polyId);
                                    }
                                    markersPlugin.addMarker(markerConfigPoly);
                                    activeMarkers.add(polyId);
                                }
                            } catch(e) { console.warn("Error parsing poligono for lote", l.id, e); }
                        } else {
                            if (markersPlugin.markers[polyId]) {

        function hexToRgbA(hex, alpha){
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){
                    c= [c[0], c[0], c[1], c[1], c[2], c[2]];
                }
                c= '0x'+c.join('');
                return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
            }
            return hex;
        }

            document.getElementById('simulador-modal').classList.add('active');

        function sincronizarRangoCuota() {
            if(!simuladorLoteActual) return;
            let valorInput = parsearDinero(document.getElementById('sim-cuota-inicial').value);
            const valorTotal = parsearDinero(simuladorLoteActual.precio);

            if(valorInput > valorTotal) {
                valorInput = valorTotal;
                document.getElementById('sim-cuota-inicial').value = valorInput;
            }
            if(valorInput < 0 || isNaN(valorInput)) {
                valorInput = 0;
            }

            document.getElementById('sim-rango-cuota').value = valorInput;
            actualizarLabelCuotaPorcentaje();
            calcularSimulacion();
        }

        function sincronizarInputCuota() {
            const valorRango = document.getElementById('sim-rango-cuota').value;
            document.getElementById('sim-cuota-inicial').value = valorRango;
            actualizarLabelCuotaPorcentaje();
            calcularSimulacion();
        }

        function actualizarLabelCuotaPorcentaje() {
            if(!simuladorLoteActual) return;
            const valorTotal = parsearDinero(simuladorLoteActual.precio);
            const cuota = parsearDinero(document.getElementById('sim-rango-cuota').value);
            let porcentaje = 0;
            if(valorTotal > 0) {

            }

        function sincronizarMeses() {

        function parsearDinero(textoDinero) {
            if(!textoDinero) return 0;
            const soloNumeros = String(textoDinero).replace(/[^\d.-]/g, '');
            return parseFloat(soloNumeros) || 0;
        }

        function formatearDinero(valor) {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(valor);
        }

        function calcularSimulacion() {
            if(!simuladorLoteActual) return;

            const valorTotal = parsearDinero(simuladorLoteActual.precio);
            let cuotaInicial = parsearDinero(document.getElementById('sim-cuota-inicial').value);

            if (cuotaInicial > valorTotal) {
                cuotaInicial = valorTotal;
                document.getElementById('sim-cuota-inicial').value = cuotaInicial;
            }

            let meses = parseInt(document.getElementById('sim-meses').value) || 1;
            if (meses < 1) meses = 1;
            if (meses > 24) meses = 24;

            const saldoFinanciar = valorTotal - cuotaInicial;
            const valorCuotaMensual = saldoFinanciar / meses;

            document.getElementById('sim-saldo').innerText = formatearDinero(saldoFinanciar);
            document.getElementById('sim-cuota-mensual').innerText = formatearDinero(valorCuotaMensual);
        }

                element.innerHTML = htmlTemplate;
                
                // It's better to pass the raw string if we want html2pdf to handle the iframe creation,
                // or if we must attach it, we can use a worker or hidden iframe mechanism, 
                // but html2pdf typically handles detached elements/strings well if images are loaded. 
                // Let's use string directly to let html2pdf handle the container logic internally.

                const opt = {
                    margin:       0,
                    filename:     `Cotizacion_${simuladorLoteActual.nombre.replace(/\s+/g, '_')}_${cNombre.replace(/\s+/g, '_')}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, allowTaint: true, logging: false },
                    jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                };

                window.mostrarProgreso(50);
                await html2pdf().set(opt).from(htmlTemplate).save();
                window.mostrarProgreso(100);

                btn.innerText = "¡PDF Generado! ✅";
                setTimeout(() => { btn.innerText = originalText; }, 3000);

            } catch (error) {
                window.mostrarProgreso(100);
                btn.innerText = originalText;
                window.mostrarError("generarPDF", error);
            }
        }

        function setupRealtimeSubscription() {
            try {
                if(!supabaseClient) return;
                supabaseClient.channel('public_data_changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'lotes' }, payload => {
                        cargarDatosPublicos();
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'pois' }, payload => {
                        cargarDatosPublicos();
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'poligonos_360' }, payload => {
                        cargarDatosPublicos();
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'configuracion' }, payload => {
                        if (payload.new && payload.new.titulo) {
                            let tempTitulo = payload.new.titulo;
                            let newLogoUrl = "";
                            let newColor = "#D4AF37";
                            let newFont = "Montserrat";
                            let newPreloaderUrl = "";

                            const extractValue = (str, prefix) => {
                                if (str.includes(`|${prefix}:`)) {
                                    let parts = str.split(`|${prefix}:`);
                                    let val = parts[1];
                                    if (val.includes('|')) {
                                        val = val.split('|')[0];
                                    }
                                    return val;
                                }
                                return "";
                            };

                            const removeValue = (str, prefix) => {
                                if (str.includes(`|${prefix}:`)) {
                                    let regex = new RegExp(`\\|${prefix}:[^\\|]*`);
                                    return str.replace(regex, '');
                                }
                                return str;
                            };

                            newPreloaderUrl = extractValue(tempTitulo, "PRELOADER");
                            tempTitulo = removeValue(tempTitulo, "PRELOADER");

                            newLogoUrl = extractValue(tempTitulo, "LOGO");
                            tempTitulo = removeValue(tempTitulo, "LOGO");

                            let extractedFont = extractValue(tempTitulo, "FONT");
                            if (extractedFont) newFont = extractedFont;
                            tempTitulo = removeValue(tempTitulo, "FONT");

                            let extractedColor = extractValue(tempTitulo, "COLOR");
                            if (extractedColor) newColor = extractedColor;
                            tempTitulo = removeValue(tempTitulo, "COLOR");

                            document.getElementById('display-title').innerText = tempTitulo;
                            document.getElementById('display-title').style.color = newColor;
                            document.getElementById('display-title').style.fontFamily = newFont;

                            if (newPreloaderUrl) {
                                const isVideo = newPreloaderUrl.match(/\.(mp4|webm|ogg)(?:\?.*)?$/i);
                                const preloaderImg = document.getElementById('preloader-bg-img');
                                const preloaderVideo = document.getElementById('preloader-video');
                                if (preloaderImg && preloaderVideo) {
                                    if (isVideo) {
                                        preloaderImg.style.display = 'none';
                                        preloaderVideo.src = newPreloaderUrl;
                                        preloaderVideo.style.display = 'block';
                                    } else {
                                        preloaderVideo.style.display = 'none';
                                        preloaderImg.src = newPreloaderUrl;
                                        preloaderImg.style.display = 'block';
                                    }
                                }
                            }

                            if (newLogoUrl) {
                                document.getElementById('display-logo').src = newLogoUrl;
                                document.getElementById('display-logo').style.display = 'block';
                            } else {
                                document.getElementById('display-logo').style.display = 'none';
                            }
                        }
                        if (payload.new && payload.new.imagen_url && viewer) {
                            viewer.setPanorama(payload.new.imagen_url);
                        }
                    })
                    .subscribe((status, err) => {
                        if (err) throw err;
                    });
            } catch (error) {
                window.mostrarError("setupRealtimeSubscription", error);
            }
        }

        window.onload = function() {
            try {
                initClient().then(() => {
                    setTimeout(attachModalEvents, 500);
                    setupRealtimeSubscription();
                }).catch(error => {
                    window.mostrarError("onload", error);
                });
            } catch (error) {
                window.mostrarError("onload (síncrono)", error);
            }
        };
        
    </script>
</body>
