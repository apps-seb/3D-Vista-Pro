<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista 360 - Rincón de Baviera</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.1.4/index.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.1.4/index.min.css" />
    
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #000; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; }

        #global-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: #D4AF37;
            width: 0%;
            z-index: 9999;
            transition: width 0.3s, opacity 0.3s;
            opacity: 0;
            box-shadow: 0 0 10px #D4AF37;
        }
        .header-premium { position: absolute; top: 0; left: 0; width: 100%; padding: 20px 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); color: white; z-index: 10; pointer-events: none; }
        .header-title { font-size: 1.4rem; font-weight: 600; letter-spacing: 2px; color: #D4AF37; text-transform: uppercase; }

        .inventory-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0, 0, 0, 0.8); padding: 12px 25px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.4); z-index: 10; white-space: nowrap; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        @media (max-width: 600px) { .inventory-bar { width: 90%; max-width: 350px; padding: 10px; gap: 10px; border-radius: 12px; overflow-x: auto; justify-content: flex-start; } .inv-item { font-size: 0.75rem; } }
        
        .inv-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #fff; }
        .inv-dot { width: 10px; height: 10px; border-radius: 50%; }
        .inv-count { background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 12px; }

        .lote-marker { width: 34px; height: 34px; border: 2px solid #fff; border-radius: 50%; cursor: pointer; animation: pulse 2s infinite; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #111; border: 1px solid #D4AF37; border-radius: 12px; padding: 25px; width: 85%; max-width: 320px; color: white; text-align: center; position: relative; }
        .btn-close { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; }
        
        .modal-title { font-size: 1.5rem; color: #D4AF37; margin: 0 0 5px 0; }
        .modal-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 20px; }
        
        .info-box { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .btn-whatsapp { display: block; padding: 15px; background: #25D366; color: white; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 15px; text-transform: uppercase; font-size: 0.9rem; }

        #preloader { position: fixed; inset: 0; background: #050505; z-index: 10000; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease; }
        .preloader-content { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #preloader-logo { max-height: 120px; max-width: 80vw; object-fit: contain; animation: logo-pulse 2s infinite; border-radius: 8px; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(212, 175, 55, 0.3); border-top-color: #D4AF37; border-radius: 50%; animation: spin 1s linear infinite; }
        .preloader-text { color: #D4AF37; font-size: 1.1rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; animation: logo-pulse 2s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes logo-pulse { 0% { opacity: 0.7; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.7; transform: scale(0.98); } }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="preloader-content">
            <img id="preloader-logo" src="" alt="Logo" style="display:none;">
            <div class="spinner"></div>
            <div class="preloader-text">Cargando entorno 360...</div>
        </div>
    </div>

    <div id="global-progress"></div>

    <div class="header-premium">
        <div class="header-title" style="display: flex; align-items: center; gap: 10px;">
            <img id="display-logo" style="height: 40px; border-radius: 4px; display: none;">
            <span id="display-title">Cargando...</span>
        </div>
    </div>

    <div class="inventory-bar">
        <div class="inv-item"><span class="inv-dot" style="background:#2ecc71"></span> Disp: <span class="inv-count" id="count-disp">0</span></div>
        <div class="inv-item"><span class="inv-dot" style="background:#f39c12"></span> Resrv: <span class="inv-count" id="count-res">0</span></div>
        <div class="inv-item"><span class="inv-dot" style="background:#e74c3c"></span> Vend: <span class="inv-count" id="count-vend">0</span></div>
    </div>

    <div id="viewer"></div>

    <div id="premium-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; max-height: 90vh; overflow-y: auto;">
            <button class="btn-close" onclick="cerrarModal()">&times;</button>
            <h2 class="modal-title" id="m-titulo">Lote</h2>
            <div class="modal-badge" id="m-estado">Estado</div>
            <div class="info-box" style="margin-bottom: 5px;">Área: <strong id="m-area">0</strong> m²</div>
            <div class="info-box" style="margin-bottom: 15px;">Precio Total: <strong id="m-precio">0</strong></div>

            <button id="btn-toggle-simulador" onclick="toggleSimulador()" style="display:none; width:100%; padding:12px; background:#111; color:#D4AF37; border:1px solid #D4AF37; border-radius:8px; margin-bottom:15px; font-weight:bold; cursor:pointer; text-transform:uppercase;">Abrir Simulador</button>

            <div id="simulator-container" style="display:none; background:#1a1a1a; padding:15px; border-radius:8px; border:1px solid #444; margin-bottom:15px; text-align:left; font-size:0.85rem;">
                <!-- El contenido se inyecta dinámicamente al abrir un lote -->
            </div>

            <a href="#" target="_blank" class="btn-whatsapp" id="m-whatsapp" style="margin-top: 5px;">Contactar por WhatsApp</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.1.4/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.1.4/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        window.mostrarProgreso = function(porcentaje) {
            const bar = document.getElementById('global-progress');
            if (!bar) return;
            bar.style.opacity = '1';
            bar.style.width = porcentaje + '%';
            if (porcentaje >= 100) {
                setTimeout(() => {
                    bar.style.opacity = '0';
                    setTimeout(() => { bar.style.width = '0%'; }, 300);
                }, 500);
            }
        };

        window.mostrarError = function(contexto, err) {
            window.mostrarProgreso(100);
            const preloader = document.getElementById('preloader');
            if (preloader) preloader.style.display = 'none';
            console.error("Error en " + contexto + ":", err);
            const msg = err && err.message ? err.message : String(err);
            const titleElement = document.getElementById('display-title');
            if(titleElement) {
                titleElement.innerText = "Error en " + contexto + ": " + msg;
                titleElement.style.color = "#ff4444";
            }
            alert("Error en " + contexto + ":\n" + msg);
        }

        // CAZADOR DE ERRORES GLOBALES
        window.onerror = function(msg, url, line) {
            window.mostrarError("Global", "Línea " + line + " - " + msg);
            return false;
        };

        window.addEventListener('unhandledrejection', function(event) {
            window.mostrarError("Promesa Rechazada", event.reason);
        });

        const supabaseUrl = 'https://mungbffwwjobinfcympd.supabase.co';
        const supabaseKey = 'sb_publishable_yW5gsHp1w8ElbWRTeoMJYw_ZC-u0j9e';
        
        let supabaseClient;
        let viewer, markersPlugin;
        const fallbackImage = 'https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg';
        let globalSimuladorData = null;
        let selectedLoteData = null;

        async function initClient() {
            let panoUrl = fallbackImage;
            let titulo = "Rincón de Baviera";
            let logoUrl = "";

            try {
                if (!window.supabase) throw new Error("Base de datos no cargada");
                if (!window.PhotoSphereViewer) throw new Error("Visor 360 no cargado");

                supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

                try {
                    const { data: config, error: configError } = await supabaseClient.from('configuracion').select('*').eq('id', 1).maybeSingle();
                    if (configError) throw new Error(configError.message);
                    if (config) {
                        if (config.imagen_url) panoUrl = config.imagen_url;
                        if (config.titulo) {
                            if (config.titulo.includes('|LOGO:')) {
                                let parts = config.titulo.split('|LOGO:');
                                titulo = parts[0];
                                logoUrl = parts[1];
                            } else {
                                titulo = config.titulo;
                            }
                        }
                        if (config.simulador_data) {
                            try {
                                globalSimuladorData = JSON.parse(config.simulador_data);
                            } catch (e) {
                                console.warn("Error parsing simulador data", e);
                            }
                        }
                    }
                } catch (dbError) {
                    console.warn("No se pudo cargar la configuración de Supabase. Usando valores por defecto.", dbError);
                    window.mostrarError("Conexión BD", dbError);
                }

                document.getElementById('display-title').innerText = titulo;
                if (logoUrl) {
                    document.getElementById('display-logo').src = logoUrl;
                    document.getElementById('display-logo').style.display = 'block';
                    const plogo = document.getElementById('preloader-logo');
                    if (plogo) {
                        plogo.src = logoUrl;
                        plogo.style.display = 'block';
                    }
                } else {
                    document.getElementById('display-logo').style.display = 'none';
                }

                viewer = new PhotoSphereViewer.Viewer({
                    container: document.querySelector('#viewer'),
                    panorama: panoUrl, 
                    touchmoveTwoFingers: false, mousewheelCtrlKey: false,
                    defaultYaw: '0deg', defaultPitch: '0deg',
                    navbar: false,
                    plugins: [ [PhotoSphereViewer.MarkersPlugin, { markers: [] }] ]
                });

                markersPlugin = viewer.getPlugin(PhotoSphereViewer.MarkersPlugin);

                viewer.addEventListener('ready', async () => {
                    await cargarDatosPublicos();
                    const preloader = document.getElementById('preloader');
                    if (preloader) {
                        preloader.style.opacity = '0';
                        setTimeout(() => preloader.style.display = 'none', 800);
                    }
                });

            } catch (error) {
                window.mostrarError("initClient", error);
            }
        }

        async function cargarDatosPublicos() {
            try {
                if (!supabaseClient) return;
                const { data: lotes, error: lotesError } = await supabaseClient.from('lotes').select('*');
                if (lotesError) throw lotesError;

                let disp = 0, res = 0, vend = 0;

                const activeMarkers = new Set();

                if (lotes) {
                    lotes.forEach(l => {
                        activeMarkers.add(l.id);
                        let bg = l.estado === 'Vendido' ? 'rgba(231,76,60,0.9)' : (l.estado === 'Reservado' ? 'rgba(243,156,18,0.9)' : 'rgba(46,204,113,0.9)');
                        let shadow = l.estado === 'Vendido' ? '#e74c3c' : (l.estado === 'Reservado' ? '#f39c12' : '#2ecc71');

                        if(l.estado === 'Vendido') vend++; else if(l.estado === 'Reservado') res++; else disp++;

                        let shortName = l.nombre.replace(/lote\s*/i, '').trim();
                        if(shortName.length > 4) shortName = shortName.substring(0, 4);

                        const htmlContent = `<div class="lote-marker" style="background:${bg}; box-shadow: 0 0 15px ${shadow}">${shortName}</div>`;

                        if (markersPlugin.markers[l.id]) {
                            markersPlugin.updateMarker({
                                id: l.id,
                                html: htmlContent,
                                data: { type: 'lote', nombre: l.nombre, area: l.area + ' m²', precio: l.precio, estado: l.estado }
                            });
                        } else {
                            markersPlugin.addMarker({
                                id: l.id, position: { yaw: l.yaw, pitch: l.pitch },
                                html: htmlContent,
                                size: { width: 34, height: 34 }, anchor: 'center center',
                                data: { type: 'lote', nombre: l.nombre, area: l.area + ' m²', precio: l.precio, estado: l.estado }
                            });
                        }
                    });
                }

                document.getElementById('count-disp').innerText = disp;
                document.getElementById('count-res').innerText = res;
                document.getElementById('count-vend').innerText = vend;

                window.mostrarProgreso(50);
                const { data: pois, error: poisError } = await supabaseClient.from('pois').select('*');
                if (poisError) throw poisError;

                if (pois) {
                    pois.forEach(p => {
                        activeMarkers.add(p.id);
                        if (!markersPlugin.markers[p.id]) {
                            let displayText = p.content;
                            let displayVisualType = null;
                            
                            // Extraer base64 y texto de p.content porque p.visualtype no existe en admin.html inserción
                            if (p.content && p.content.startsWith('IMG|')) {
                                const parts = p.content.split('|TEXT|');
                                displayVisualType = parts[0];
                                displayText = parts[1] || 'Punto';
                            }
                        
                            let htmlContent = `<div style="display:flex;flex-direction:column;align-items:center;">
                                        <div style="background:rgba(0,0,0,0.8);color:#fff;padding:5px 12px;border:1px solid #D4AF37;border-radius:4px;font-weight:bold;">${displayText}</div>
                                        <div style="width:2px;height:40px;background:#fff;"></div>
                                        <div style="width:14px;height:14px;background:#D4AF37;border-radius:50%;"></div>
                                       </div>`;

                            if (displayVisualType && displayVisualType.startsWith('IMG|')) {
                                let imgData = displayVisualType.substring(4);
                                htmlContent = `<div style="display:flex;flex-direction:column;align-items:center;">
                                        <div>
                                            <img src="${imgData}" style="max-width: 120px; max-height: 120px; object-fit: contain;">
                                        </div>
                                       </div>`;
                            }

                            markersPlugin.addMarker({
                                id: p.id, position: { yaw: p.yaw, pitch: p.pitch },
                                html: htmlContent,
                                size: { width: 120, height: 120 }, anchor: 'bottom center'
                            });
                        }
                    });
                }
                window.mostrarProgreso(100);

                Object.keys(markersPlugin.markers).forEach(markerId => {
                    if (!activeMarkers.has(markerId)) {
                        markersPlugin.removeMarker(markerId);
                    }
                });
            } catch (error) {
                window.mostrarError("cargarDatosPublicos", error);
            }
        }

        window.cerrarModal = function() {
            try {
                document.getElementById('premium-modal').classList.remove('active');
                document.getElementById('simulator-container').style.display = 'none';
                document.getElementById('btn-toggle-simulador').innerText = 'Abrir Simulador';
            } catch (error) {
                window.mostrarError("cerrarModal", error);
            }
        }

        window.toggleSimulador = function() {
            const container = document.getElementById('simulator-container');
            const btn = document.getElementById('btn-toggle-simulador');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
                btn.innerText = 'Cerrar Simulador';
            } else {
                container.style.display = 'none';
                btn.innerText = 'Abrir Simulador';
            }
        }

        function attachModalEvents() {
            try {
                if(!markersPlugin) return;
                markersPlugin.addEventListener('select-marker', (e) => {
                    const marker = e.marker;
                    if (marker.config.data && marker.config.data.type === 'lote') {
                        selectedLoteData = marker.config.data;
                        document.getElementById('m-titulo').innerText = marker.config.data.nombre;
                        document.getElementById('m-area').innerText = parseFloat(marker.config.data.area).toLocaleString('es-CO');

                        let areaNum = parseFloat(marker.config.data.area) || 0;
                        let valorTotal = 0;
                        let isSimulatorActive = false;

                        // Use simulator if available
                        if (globalSimuladorData && globalSimuladorData.valorLote) {
                            valorTotal = areaNum * parseFloat(globalSimuladorData.valorLote);
                            isSimulatorActive = true;
                        } else {
                            // Fallback to manual price if simulator not set
                            let priceText = String(marker.config.data.precio).replace(/[^\d]/g, '');
                            valorTotal = parseFloat(priceText) || 0;
                        }

                        document.getElementById('m-precio').innerText = "$" + valorTotal.toLocaleString('es-CO');

                        const est = document.getElementById('m-estado');
                        est.innerText = marker.config.data.estado;
                        est.style.color = marker.config.data.estado === 'Vendido' ? '#e74c3c' : (marker.config.data.estado === 'Reservado' ? '#f39c12' : '#2ecc71');
                        est.style.background = 'rgba(255,255,255,0.1)';

                        if (isSimulatorActive && marker.config.data.estado !== 'Vendido') {
                            document.getElementById('btn-toggle-simulador').style.display = 'block';
                            document.getElementById('simulator-container').style.display = 'none';
                            document.getElementById('btn-toggle-simulador').innerText = 'Abrir Simulador';

                            let pctCuota = parseFloat(globalSimuladorData.cuotaInicial) || 30;
                            let mesesMax = parseInt(globalSimuladorData.meses) || 12;
                            let meses = mesesMax; // Default

                            // Re-render simulator content to include dynamic range input
                            let simHtml = `
                                <h3 style="color:#D4AF37; margin-top:0; text-align:center; font-size:1.1rem;">Simulador de Financiación</h3>
                                <p>Cuota Inicial (<span id="sim-porcentaje-cuota">${pctCuota}</span>%): <strong id="sim-valor-cuota" style="float:right; color:#2ecc71;">$0</strong></p>
                                <p>Saldo a Financiar: <strong id="sim-saldo" style="float:right;">$0</strong></p>
                                <div style="margin: 15px 0;">
                                    <label style="display:block; margin-bottom:5px;">Meses a Financiar: <strong id="sim-meses" style="color:#D4AF37;">${meses}</strong></label>
                                    <input type="range" id="sim-meses-rango" min="1" max="${mesesMax}" value="${meses}" style="width:100%; cursor:pointer;">
                                </div>
                                <hr style="border-color:#333; margin:10px 0;">
                                <p style="font-size:1rem; text-align:center; color:#fff;">Cuota Mensual Aprox:<br><strong id="sim-cuota-mensual" style="color:#D4AF37; font-size:1.2rem;">$0</strong></p>

                                <div style="margin-top:15px;">
                                    <input type="text" id="sim-nombre" placeholder="Nombre completo" style="width:100%; padding:8px; margin-bottom:8px; background:#000; border:1px solid #333; color:#fff; border-radius:4px; box-sizing:border-box;">
                                    <input type="tel" id="sim-telefono" placeholder="Teléfono" style="width:100%; padding:8px; margin-bottom:8px; background:#000; border:1px solid #333; color:#fff; border-radius:4px; box-sizing:border-box;">
                                    <input type="text" id="sim-direccion" placeholder="Dirección" style="width:100%; padding:8px; margin-bottom:8px; background:#000; border:1px solid #333; color:#fff; border-radius:4px; box-sizing:border-box;">
                                    <input type="email" id="sim-correo" placeholder="Correo electrónico" style="width:100%; padding:8px; margin-bottom:8px; background:#000; border:1px solid #333; color:#fff; border-radius:4px; box-sizing:border-box;">
                                    <button onclick="generarPDF()" style="width:100%; padding:10px; background:#D4AF37; color:#000; font-weight:bold; border:none; border-radius:4px; cursor:pointer; margin-bottom:8px;">Generar PDF de Cotización</button>
                                </div>
                            `;
                            document.getElementById('simulator-container').innerHTML = simHtml;

                            const actualizarSimulador = () => {
                                const m = parseInt(document.getElementById('sim-meses-rango').value) || 1;
                                document.getElementById('sim-meses').innerText = m;

                                let cuotaInicialVal = valorTotal * (pctCuota / 100);
                                let saldo = valorTotal - cuotaInicialVal;
                                let cuotaMensual = saldo / m;

                                document.getElementById('sim-valor-cuota').innerText = "$" + cuotaInicialVal.toLocaleString('es-CO', {maximumFractionDigits:0});
                                document.getElementById('sim-saldo').innerText = "$" + saldo.toLocaleString('es-CO', {maximumFractionDigits:0});
                                document.getElementById('sim-cuota-mensual').innerText = "$" + cuotaMensual.toLocaleString('es-CO', {maximumFractionDigits:0});

                                selectedLoteData.simulador = {
                                    valorTotal, pctCuota, cuotaInicialVal, saldo, meses: m, cuotaMensual
                                };
                            };

                            document.getElementById('sim-meses-rango').addEventListener('input', actualizarSimulador);
                            actualizarSimulador(); // Inicializar cálculos

                        } else {
                            document.getElementById('btn-toggle-simulador').style.display = 'none';
                            document.getElementById('simulator-container').style.display = 'none';
                        }

                        // Configuración del botón de WhatsApp y PDF
                        const numeroTel = "573000000000";
                        const msj = `Hola, me interesa el ${marker.config.data.nombre} del proyecto ${document.getElementById('display-title').innerText}.`;
                        document.getElementById('m-whatsapp').href = `https://wa.me/${numeroTel}?text=${encodeURIComponent(msj)}`;

                        document.getElementById('premium-modal').classList.add('active');
                    }
                });
            } catch (error) {
                window.mostrarError("attachModalEvents", error);
            }
        }

        window.generarPDF = function() {
            try {
                const nombre = document.getElementById('sim-nombre').value;
                const telefono = document.getElementById('sim-telefono').value;
                const direccion = document.getElementById('sim-direccion').value;
                const correo = document.getElementById('sim-correo').value;

                if(!nombre || !telefono || !correo) {
                    alert("Por favor completa nombre, teléfono y correo para generar el PDF.");
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                const proyectoNombre = document.getElementById('display-title').innerText;
                const logoImg = document.getElementById('display-logo');

                // Header
                if (logoImg && logoImg.style.display !== 'none' && logoImg.src) {
                    try {
                        // Intentar añadir logo si es base64 o URL permitida
                        doc.addImage(logoImg.src, 'PNG', 15, 15, 30, 30);
                    } catch(e) { console.warn("No se pudo cargar logo en PDF", e); }
                }

                doc.setFont("helvetica", "bold");
                doc.setFontSize(22);
                doc.setTextColor(212, 175, 55); // Dorado
                doc.text(proyectoNombre, 50, 25);

                doc.setFontSize(14);
                doc.setTextColor(50, 50, 50);
                doc.text("Cotización de Lote", 50, 35);

                // Cliente info
                doc.setFontSize(11);
                doc.text(`Cliente: ${nombre}`, 15, 60);
                doc.text(`Teléfono: ${telefono}`, 15, 67);
                doc.text(`Correo: ${correo}`, 15, 74);
                if(direccion) doc.text(`Dirección: ${direccion}`, 15, 81);

                doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 140, 60);

                // Lote info
                const sim = selectedLoteData.simulador;
                const areaTxt = parseFloat(selectedLoteData.area).toLocaleString('es-CO');

                doc.autoTable({
                    startY: 95,
                    headStyles: { fillColor: [20, 20, 20], textColor: [212, 175, 55] },
                    head: [['Descripción del Lote', 'Detalle']],
                    body: [
                        ['Nombre del Lote', selectedLoteData.nombre],
                        ['Área', `${areaTxt} m²`],
                        ['Valor Total Estimado', `$${sim.valorTotal.toLocaleString('es-CO', {maximumFractionDigits:0})}`]
                    ]
                });

                // Financiación info
                doc.autoTable({
                    startY: doc.lastAutoTable.finalY + 15,
                    headStyles: { fillColor: [212, 175, 55], textColor: [0, 0, 0] },
                    head: [['Plan de Financiación', 'Valores']],
                    body: [
                        [`Cuota Inicial (${sim.pctCuota}%)`, `$${sim.cuotaInicialVal.toLocaleString('es-CO', {maximumFractionDigits:0})}`],
                        ['Saldo a Financiar', `$${sim.saldo.toLocaleString('es-CO', {maximumFractionDigits:0})}`],
                        [`Plazo (Meses)`, `${sim.meses}`],
                        ['Cuota Mensual Estimada', `$${sim.cuotaMensual.toLocaleString('es-CO', {maximumFractionDigits:0})}`]
                    ]
                });

                doc.setFontSize(10);
                doc.setTextColor(0, 0, 0);
                doc.text("Asesor Comercial: " + ((globalSimuladorData && globalSimuladorData.asesorNombre) ? globalSimuladorData.asesorNombre : "No especificado"), 15, doc.lastAutoTable.finalY + 15);
                doc.text("Teléfono: " + ((globalSimuladorData && globalSimuladorData.asesorTelefono) ? globalSimuladorData.asesorTelefono : "No especificado"), 15, doc.lastAutoTable.finalY + 20);

                doc.setFontSize(9);
                doc.setTextColor(100, 100, 100);
                doc.text("Nota: Los valores aquí presentados son una simulación y pueden estar sujetos a cambios.", 15, doc.lastAutoTable.finalY + 30);

                doc.save(`Cotizacion_${selectedLoteData.nombre}_${nombre.replace(/\s+/g, '')}.pdf`);

            } catch(error) {
                console.error("Error generando PDF", error);
                alert("Hubo un error al generar el PDF.");
            }
        }

        function setupRealtimeSubscription() {
            try {
                if(!supabaseClient) return;
                supabaseClient.channel('public_data_changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'lotes' }, payload => {
                        cargarDatosPublicos();
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'pois' }, payload => {
                        cargarDatosPublicos();
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'configuracion' }, payload => {
                        if (payload.new && payload.new.titulo) {
                            if (payload.new.titulo.includes('|LOGO:')) {
                                let parts = payload.new.titulo.split('|LOGO:');
                                document.getElementById('display-title').innerText = parts[0];
                                document.getElementById('display-logo').src = parts[1];
                                document.getElementById('display-logo').style.display = 'block';
                            } else {
                                document.getElementById('display-title').innerText = payload.new.titulo;
                                document.getElementById('display-logo').style.display = 'none';
                            }
                        }
                        if (payload.new && payload.new.imagen_url && viewer) {
                            viewer.setPanorama(payload.new.imagen_url);
                        }
                    })
                    .subscribe((status, err) => {
                        if (err) throw err;
                    });
            } catch (error) {
                window.mostrarError("setupRealtimeSubscription", error);
            }
        }

        window.onload = function() {
            try {
                initClient().then(() => {
                    setTimeout(attachModalEvents, 500);
                    setupRealtimeSubscription();
                }).catch(error => {
                    window.mostrarError("onload", error);
                });
            } catch (error) {
                window.mostrarError("onload (síncrono)", error);
            }
        };
        
    </script>
</body>
</html>
