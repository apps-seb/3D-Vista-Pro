<!DOCTYPE html>
<html>
<head>
<style>
  :root {
      --primary-gradient: linear-gradient(135deg, #f26522 0%, #ff8c00 100%);
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(242, 101, 34, 0.15);
  }
  body { background: #eee; padding: 50px; }

  .card-mask {
      width: 200px;
      height: 100px;
      position: relative;
      background: var(--glass-bg);
      border-radius: 16px;
      z-index: 1;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
  }
  .card-mask::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 2px;
      background: var(--primary-gradient);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: -1;
      pointer-events: none;
  }

  .card-border-image {
      width: 200px;
      height: 100px;
      position: relative;
      background: var(--glass-bg);
      border: 2px solid transparent;
      border-radius: 16px; /* border-image doesn't support border-radius */
      border-image: var(--primary-gradient) 1;
      margin-bottom: 20px;
  }
</style>
</head>
<body>
  <div class="card-mask">Mask Gradient</div>
  <div class="card-border-image">Border Image</div>
</body>
</html>
