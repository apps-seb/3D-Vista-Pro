<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rincón de Baviera</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin/index.min.css" />
    
    <style>
        /* Estructura Base 50/50 Mobile First */
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #000; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .viewer-wrapper { flex: 1; min-height: 50vh; position: relative; width: 100%; }
        #viewer { width: 100%; height: 100%; }
        
        .header-premium { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%); z-index: 10; pointer-events: none; }
        .header-title { font-size: 1.2rem; font-weight: 600; color: #D4AF37; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Panel Administrador (Grid Perfecto para Celular) */
        .admin-panel { height: 50vh; background: #151515; border-top: 2px solid #D4AF37; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: 1fr; gap: 20px; box-sizing: border-box; }
        
        @media (min-width: 768px) {
            .viewer-wrapper { min-height: 60vh; }
            .admin-panel { height: 40vh; grid-template-columns: repeat(3, 1fr); }
            .header-title { font-size: 1.5rem; }
        }

        .control-group { background: #1f1f1f; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .control-label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
        
        .input-text, .input-select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-family: inherit; margin-bottom: 10px; box-sizing: border-box; }
        .input-text:focus, .input-select:focus { outline: none; border-color: #D4AF37; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-family: inherit; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .btn-upload { background: #222; color: #D4AF37; border: 1px dashed #D4AF37; }
        .btn-action { background: #D4AF37; color: #000; }
        .btn-action.active { background: #e74c3c; color: white; animation: pulse 1s infinite; }
        
        .inventory-list { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .lot-item { background: #000; border: 1px solid #333; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        
        /* Marcadores Visuales */
        .lote-marker { width: 20px; height: 20px; border: 2px solid #fff; border-radius: 50%; cursor: pointer; }
        .marker-disponible { background: rgba(46, 204, 113, 0.9); box-shadow: 0 0 10px rgba(46,204,113,0.5); }
        .marker-reservado { background: rgba(243, 156, 18, 0.9); box-shadow: 0 0 10px rgba(243,156,18,0.5); }
        .marker-vendido { background: rgba(231, 76, 60, 0.9); box-shadow: 0 0 10px rgba(231,76,60,0.5); }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* Modales */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #D4AF37; width: 90%; max-width: 320px; }
        .modal-content h3 { margin-top: 0; color: #D4AF37; font-size: 1.2rem; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="viewer-wrapper">
        <div class="header-premium"><div class="header-title" id="display-title">Cargando...</div></div>
        <div id="viewer"></div>
    </div>

    <div class="admin-panel">
        <div class="control-group">
            <span class="control-label">1. Configuración Principal</span>
            <input type="text" id="input-title" class="input-text" placeholder="Nombre del proyecto">
            <button class="btn btn-action" onclick="guardarTitulo()">Guardar Título</button>
            <hr style="border-color: #333; margin: 15px 0;">
            <label class="btn btn-upload" id="btn-upload-lbl">
                Subir Foto 360 (JPG)
                <input type="file" id="upload-360" accept="image/*" onchange="cambiarImagen(event)">
            </label>
        </div>

        <div class="control-group">
            <span class="control-label">2. Agregar Puntos al Mapa</span>
            <button id="btn-add-mode" class="btn btn-action" onclick="toggleAddMode('lote')">+ Crear Lote</button>
            <button id="btn-add-poi-mode" class="btn btn-upload" onclick="toggleAddMode('poi')">+ Crear Punto de Interés</button>
            <p style="font-size: 0.75rem; color: #888; text-align: center; margin-top: 10px;" id="add-helper">Toca el botón y luego haz clic en la foto.</p>
        </div>

        <div class="control-group">
            <span class="control-label">3. Inventario Lotes</span>
            <div id="inventory-list" class="inventory-list"><p style="font-size: 0.8rem; color: #666;">Cargando...</p></div>
        </div>
    </div>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Nuevo Lote</h3>
            <input type="text" id="lote-nombre" class="input-text" placeholder="Nombre (Ej: Lote 01)">
            <input type="text" id="lote-area" class="input-text" placeholder="Área (Ej: 500)">
            <input type="text" id="lote-precio" class="input-text" placeholder="Precio (Ej: $150.000)">
            <select id="lote-estado" class="input-select">
                <option value="Disponible">Disponible</option>
                <option value="Reservado">Reservado</option>
                <option value="Vendido">Vendido</option>
            </select>
            <button class="btn btn-action" onclick="guardarLote()">Guardar Lote</button>
            <button class="btn btn-upload" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <div id="add-poi-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Nuevo Punto de Interés</h3>
            <input type="text" id="poi-texto" class="input-text" placeholder="Texto (Ej: Zona Social)">
            <button class="btn btn-action" onclick="guardarPOI()">Guardar POI</button>
            <button class="btn btn-upload" onclick="cerrarModalPOI()">Cancelar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CREDENCIALES EXACTAS (No modificar)
        const supabaseUrl = 'https://mungbffwwjobinfcympd.supabase.co';
        const supabaseKey = 'sb_publishable_FdwVZx53pGAy_3Zf24-z6w_BJAPi0eD';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let isAddMode = false; let currentModeType = ''; let tempCoords = { yaw: 0, pitch: 0 };

        const viewer = new PhotoSphereViewer.Viewer({
            container: document.querySelector('#viewer'),
            panorama: 'https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg',
            touchmoveTwoFingers: false, mousewheelCtrlKey: false,
            defaultYaw: '130deg', defaultPitch: '-15deg', defaultZoomLvl: 30,
            navbar: ['zoom', 'fullscreen'],
            plugins: [ [PhotoSphereViewer.MarkersPlugin, { markers: [] }] ]
        });
        const markersPlugin = viewer.getPlugin(PhotoSphereViewer.MarkersPlugin);

        viewer.addEventListener('ready', cargarDatosDesdeBD);

        async function cargarDatosDesdeBD() {
            try {
                const { data: configData } = await supabase.from('configuracion').select('*').eq('id', 1).single();
                if (configData) {
                    if (configData.titulo) {
                        document.getElementById('input-title').value = configData.titulo; 
                        document.getElementById('display-title').innerText = configData.titulo;
                    }
                    if (configData.imagen_url) viewer.setPanorama(configData.imagen_url);
                }

                const { data: lotesData } = await supabase.from('lotes').select('*');
                document.getElementById('inventory-list').innerHTML = ''; // Limpiar
                if (lotesData && lotesData.length > 0) {
                    lotesData.forEach(lote => { tempCoords = { yaw: lote.yaw, pitch: lote.pitch }; renderLote(lote.id, lote.nombre, lote.area, lote.precio, lote.estado); });
                } else {
                    document.getElementById('inventory-list').innerHTML = '<p style="font-size:0.8rem;color:#666;">No hay lotes creados.</p>';
                }

                const { data: poisData } = await supabase.from('pois').select('*');
                if (poisData) {
                    poisData.forEach(poi => { tempCoords = { yaw: poi.yaw, pitch: poi.pitch }; renderPOI(poi.id, poi.content); });
                }
            } catch (err) { console.error("Error BD:", err); }
        }

        async function guardarTitulo() {
            const titulo = document.getElementById('input-title').value;
            if(!titulo) return alert("Escribe un título primero.");
            document.getElementById('display-title').innerText = titulo;
            
            const { data } = await supabase.from('configuracion').select('id').eq('id', 1).single();
            if (!data) await supabase.from('configuracion').insert([{ id: 1, titulo: titulo }]);
            else await supabase.from('configuracion').update({ titulo: titulo }).eq('id', 1);
            alert("Título actualizado correctamente.");
        }

        async function cambiarImagen(event) {
            const file = event.target.files[0];
            if (!file) return;

            const btnUpload = document.getElementById('btn-upload-lbl');
            btnUpload.innerText = "Subiendo imagen... ⏳";
            const fileName = `panorama_${Date.now()}.jpg`;
            
            const { error } = await supabase.storage.from('imagenes_360').upload(fileName, file);
            if (error) return alert("Error subiendo: " + error.message);

            const { data } = supabase.storage.from('imagenes_360').getPublicUrl(fileName);
            const imageUrl = data.publicUrl;
            
            const { data: configCheck } = await supabase.from('configuracion').select('id').eq('id', 1).single();
            if (!configCheck) await supabase.from('configuracion').insert([{ id: 1, imagen_url: imageUrl }]);
            else await supabase.from('configuracion').update({ imagen_url: imageUrl }).eq('id', 1);
            
            viewer.setPanorama(imageUrl);
            btnUpload.innerText = "¡Imagen guardada! ✅";
            setTimeout(() => { btnUpload.innerHTML = 'Subir Foto 360 (JPG) <input type="file" accept="image/*" onchange="cambiarImagen(event)">'; }, 3000);
        }

        function toggleAddMode(type) {
            isAddMode = true; currentModeType = type;
            const btnLote = document.getElementById('btn-add-mode');
            const btnPoi = document.getElementById('btn-add-poi-mode');
            btnLote.classList.remove('active'); btnPoi.classList.remove('active');
            
            if (type === 'lote') { btnLote.classList.add('active'); document.getElementById('add-helper').innerText = "TOCA LA FOTO para crear el Lote"; }
            else { btnPoi.classList.add('active'); document.getElementById('add-helper').innerText = "TOCA LA FOTO para crear el POI"; }
        }

        viewer.addEventListener('click', ({ data }) => {
            if (isAddMode) {
                tempCoords = { yaw: data.yaw, pitch: data.pitch };
                isAddMode = false;
                document.getElementById('btn-add-mode').classList.remove('active');
                document.getElementById('btn-add-poi-mode').classList.remove('active');
                document.getElementById('add-helper').innerText = "Toca el botón y luego haz clic en la foto.";

                if (currentModeType === 'lote') {
                    document.getElementById('lote-nombre').value = ''; document.getElementById('add-modal').classList.add('active');
                } else {
                    document.getElementById('poi-texto').value = ''; document.getElementById('add-poi-modal').classList.add('active');
                }
            }
        });

        function cerrarModal() { document.getElementById('add-modal').classList.remove('active'); }
        function cerrarModalPOI() { document.getElementById('add-poi-modal').classList.remove('active'); }

        async function guardarLote() {
            const nombre = document.getElementById('lote-nombre').value || `Lote Nuevo`;
            const area = document.getElementById('lote-area').value || '0';
            const precio = document.getElementById('lote-precio').value || '0';
            const estado = document.getElementById('lote-estado').value;
            const idUnico = 'lote-' + Date.now();
            
            await supabase.from('lotes').insert([{ id: idUnico, nombre, area, precio, estado, yaw: tempCoords.yaw, pitch: tempCoords.pitch }]);
            renderLote(idUnico, nombre, area, precio, estado);
            cerrarModal();
        }

        function renderLote(idUnico, nombre, area, precio, estado) {
            let color = estado === 'Vendido' ? '#e74c3c' : (estado === 'Reservado' ? '#f39c12' : '#2ecc71');
            let clase = estado === 'Vendido' ? 'marker-vendido' : (estado === 'Reservado' ? 'marker-reservado' : 'marker-disponible');

            markersPlugin.addMarker({
                id: idUnico, position: { yaw: tempCoords.yaw, pitch: tempCoords.pitch },
                html: `<div class="lote-marker ${clase}"></div>`, size: { width: 20, height: 20 }, anchor: 'center center',
                tooltip: { content: `<div style="text-align:center;"><strong style="color:#D4AF37">${nombre}</strong></div>`, position: 'top center' }
            });

            const lista = document.getElementById('inventory-list');
            if(lista.innerHTML.includes('No hay lotes')) lista.innerHTML = '';
            
            lista.innerHTML += `
                <div class="lot-item">
                    <div><span style="color:${color}">●</span> <strong>${nombre}</strong></div>
                    <select class="input-select" style="width: auto; padding: 4px; margin: 0; font-size: 0.75rem;" onchange="cambiarEstadoLote('${idUnico}', this.value)">
                        <option value="Disponible" ${estado === 'Disponible' ? 'selected' : ''}>Disp.</option>
                        <option value="Reservado" ${estado === 'Reservado' ? 'selected' : ''}>Resrv.</option>
                        <option value="Vendido" ${estado === 'Vendido' ? 'selected' : ''}>Vend.</option>
                    </select>
                </div>`;
        }

        async function cambiarEstadoLote(idLote, nuevoEstado) {
            await supabase.from('lotes').update({ estado: nuevoEstado }).eq('id', idLote);
            location.reload(); // Recarga para aplicar el color
        }

        async function guardarPOI() {
            const texto = document.getElementById('poi-texto').value || 'Punto';
            const idUnico = 'poi-' + Date.now();
            await supabase.from('pois').insert([{ id: idUnico, visualType: 'texto', content: texto, yaw: tempCoords.yaw, pitch: tempCoords.pitch }]);
            renderPOI(idUnico, texto);
            cerrarModalPOI();
        }

        function renderPOI(idUnico, texto) {
            markersPlugin.addMarker({
                id: idUnico, position: { yaw: tempCoords.yaw, pitch: tempCoords.pitch },
                html: `<div style="display:flex;flex-direction:column;align-items:center;pointer-events:none;"><div style="color:#fff;font-weight:bold;background:rgba(0,0,0,0.5);padding:2px 8px;border-radius:4px;border:1px solid #D4AF37;">${texto}</div><div style="width:2px;height:40px;background:#fff;"></div><div style="width:10px;height:10px;background:#D4AF37;border-radius:50%;"></div></div>`,
                size: { width: 100, height: 100 }, anchor: 'bottom center'
            });
        }
    </script>
</body>
</html>
