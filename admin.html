<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rincón de Baviera</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.1.4/index.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.1.4/index.min.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .viewer-area { position: absolute; top: 0; left: 0; width: 100vw; height: 50vh; }
        #viewer { width: 100%; height: 100%; }
        .header-premium { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index: 10; pointer-events: none; }
        .header-title { font-size: 1.2rem; font-weight: 600; color: #D4AF37; letter-spacing: 2px; text-transform: uppercase; }
        .admin-panel { position: absolute; bottom: 0; left: 0; width: 100vw; height: 50vh; background: #111; border-top: 3px solid #D4AF37; overflow-y: auto; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 768px) { .viewer-area { height: 60vh; } .admin-panel { height: 40vh; flex-direction: row; display: grid; grid-template-columns: repeat(3, 1fr); } }
        .control-group { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; }
        .control-label { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; text-transform: uppercase; font-weight: 600; }
        .input-text, .input-select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-family: inherit; margin-bottom: 10px; box-sizing: border-box; }
        .input-text:focus, .input-select:focus { outline: none; border-color: #D4AF37; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-family: inherit; font-weight: 600; cursor: pointer; transition: 0.2s; box-sizing: border-box; text-align: center; }
        .btn-action { background: #D4AF37; color: #000; margin-bottom: 10px; }
        .btn-upload { background: #222; color: #D4AF37; border: 1px dashed #D4AF37; display: block; }
        .btn-danger { background: #e74c3c; color: white; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
        .inventory-list { overflow-y: auto; flex: 1; max-height: 150px; }
        .lot-item { background: #000; border: 1px solid #333; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .btn-delete { background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 0.7rem; }
        .lote-marker { width: 34px; height: 34px; border: 2px solid #fff; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; text-align: center; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #D4AF37; width: 90%; max-width: 320px; box-sizing: border-box; }
        .modal-content h3 { margin-top: 0; color: #D4AF37; font-size: 1.2rem; text-align: center; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="viewer-area">
        <div class="header-premium">
            <div class="header-title" style="display: flex; align-items: center; gap: 10px;">
                <img id="display-logo" style="height: 40px; border-radius: 4px; display: none;">
                <span id="display-title">🔄 INICIANDO V3...</span>
            </div>
        </div>
        <div id="viewer"></div>
    </div>

    <div class="admin-panel">
        <div class="control-group">
            <span class="control-label">1. Configuración Principal</span>
            <input type="text" id="input-title" class="input-text" placeholder="Nombre del proyecto">
            
            <div id="logo-preview-container" style="display: none; margin-bottom: 10px; text-align: center;">
                <img id="admin-logo-preview" style="max-height: 50px; border-radius: 4px; border: 1px solid #444;" />
            </div>
            
            <label class="btn btn-upload" id="btn-upload-logo-lbl" style="margin-bottom: 10px;">
                Subir Logo (PNG/JPG)
                <input type="file" id="upload-logo" accept="image/png, image/jpeg" style="display:none;" onchange="cargarLogo(event)">
            </label>
            <input type="hidden" id="logo-data">
            
            <button class="btn btn-action" onclick="guardarTitulo()">Guardar Proyecto (Título y Logo)</button>
            <label class="btn btn-upload" id="btn-upload-lbl">
                Subir Foto 360 (JPG)
                <input type="file" id="upload-360" accept="image/jpeg" style="display:none;" onchange="cambiarImagen(event)">
            </label>
        </div>

        <div class="control-group">
            <span class="control-label">2. Herramientas de Mapa</span>
            <button id="btn-add-lote" class="btn btn-action" onclick="activarModo('lote')">+ Crear Lote</button>
            <button id="btn-add-poi" class="btn btn-action" onclick="activarModo('poi')" style="background: #222; color: #fff; border: 1px solid #444;">+ Crear Punto de Interés</button>
            <p style="font-size: 0.75rem; color: #D4AF37; text-align: center; margin-top: 10px; font-weight: bold;" id="add-helper">Selecciona una opción arriba</p>
        </div>

        <div class="control-group">
            <span class="control-label">3. Inventario en Vivo</span>
            <div id="inventory-list" class="inventory-list">
                <p style="font-size: 0.8rem; color: #666;">Cargando inventario...</p>
            </div>
        </div>
    </div>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Datos del Nuevo Lote</h3>
            <input type="text" id="lote-nombre" class="input-text" placeholder="Nombre (Ej: Lote 01)">
            <input type="text" id="lote-area" class="input-text" placeholder="Área (Ej: 500)">
            <input type="text" id="lote-precio" class="input-text" placeholder="Precio (Ej: $150.000)">
            <select id="lote-estado" class="input-select">
                <option value="Disponible">Disponible</option>
                <option value="Reservado">Reservado</option>
                <option value="Vendido">Vendido</option>
            </select>
            <button class="btn btn-action" onclick="guardarLote()">Guardar Lote</button>
            <button class="btn btn-upload" style="border:none;" onclick="cerrarModales()">Cancelar</button>
        </div>
    </div>
    <div id="poi-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Punto de Interés</h3>
            <select id="poi-tipo-visual" class="input-select" onchange="cambiarTipoPOI(this.value)">
                <option value="texto">Texto Simple</option>
                <option value="imagen">Logo / Imagen</option>
            </select>
            <input type="text" id="poi-texto" class="input-text" placeholder="Texto (Ej: Zona Social)">
            
            <div id="poi-imagen-container" style="display: none; margin-bottom: 10px;">
                <label class="btn btn-upload">
                    Subir Imagen (PNG/JPG)
                    <input type="file" id="upload-poi-img" accept="image/png, image/jpeg" style="display:none;" onchange="cargarLogoPOI(event)">
                </label>
                <input type="hidden" id="poi-img-data">
                <img id="poi-img-preview" style="max-width: 100%; max-height: 100px; display: none; margin-top: 10px; border-radius: 4px; border: 1px solid #333;" />
            </div>

            <button class="btn btn-action" onclick="guardarPOI()">Guardar POI</button>
            <button class="btn btn-upload" style="border:none;" onclick="cerrarModales()">Cancelar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.1.4/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.1.4/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        window.mostrarError = function(contexto, err) {
            console.error("Error en " + contexto + ":", err);
            const msg = err && err.message ? err.message : String(err);
            const titleElement = document.getElementById('display-title');
            if(titleElement) {
                titleElement.innerText = "Error en " + contexto + ": " + msg;
                titleElement.style.color = "#ff4444";
            }
            alert("Error en " + contexto + ":\n" + msg);
        }

        window.onerror = function(msg, url, line) {
            window.mostrarError("Global", "Línea " + line + " - " + msg);
            return false;
        };

        window.addEventListener('unhandledrejection', function(event) {
            window.mostrarError("Promesa Rechazada", event.reason);
        });

        const supabaseUrl = 'https://mungbffwwjobinfcympd.supabase.co';
        const supabaseKey = 'sb_publishable_yW5gsHp1w8ElbWRTeoMJYw_ZC-u0j9e';
        
        let supabaseClient, viewer, markersPlugin;
        let isAddMode = false; let currentMode = ''; let tempCoords = { yaw: 0, pitch: 0 };
        const fallbackImage = 'https://photo-sphere-viewer-data.netlify.app/assets/sphere.jpg';

        async function initApp() {
            let panoUrl = fallbackImage;
            let titulo = "Rincón de Baviera";
            let logoUrl = "";

            try {
                if (!window.supabase) throw new Error("No cargó Supabase");
                if (!window.PhotoSphereViewer) throw new Error("No cargó el Visor");

                supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

                try {
                    const { data: config, error: configError } = await supabaseClient.from('configuracion').select('*').eq('id', 1).maybeSingle();
                    if (configError) throw new Error(configError.message);
                    if (config) {
                        if (config.imagen_url) panoUrl = config.imagen_url;
                        if (config.titulo) {
                            if (config.titulo.includes('|LOGO:')) {
                                let parts = config.titulo.split('|LOGO:');
                                titulo = parts[0];
                                logoUrl = parts[1];
                            } else {
                                titulo = config.titulo;
                            }
                        }
                    }
                } catch (dbError) {
                    console.warn("No se pudo cargar la configuración de Supabase. Usando valores por defecto.", dbError);
                    window.mostrarError("Conexión BD", dbError);
                }

                document.getElementById('input-title').value = titulo;
                document.getElementById('display-title').innerText = titulo;
                if (logoUrl) {
                    document.getElementById('logo-data').value = logoUrl;
                    document.getElementById('display-logo').src = logoUrl;
                    document.getElementById('display-logo').style.display = 'block';
                    document.getElementById('admin-logo-preview').src = logoUrl;
                    document.getElementById('logo-preview-container').style.display = 'block';
                } else {
                    document.getElementById('display-logo').style.display = 'none';
                    document.getElementById('logo-preview-container').style.display = 'none';
                }

                viewer = new PhotoSphereViewer.Viewer({
                    container: document.querySelector('#viewer'),
                    panorama: panoUrl,
                    touchmoveTwoFingers: false,
                    mousewheelCtrlKey: false,
                    defaultYaw: '0deg', defaultPitch: '0deg',
                    navbar: false,
                    plugins: [ [PhotoSphereViewer.MarkersPlugin, { markers: [] }] ]
                });

                markersPlugin = viewer.getPlugin(PhotoSphereViewer.MarkersPlugin);

                viewer.addEventListener('ready', cargarInventario);
                viewer.addEventListener('click', handleMapClick);

            } catch (error) {
                window.mostrarError("initApp", error);
            }
        }

        window.cargarInventario = async function() {
            try {
                if (!supabaseClient) return;
                const lista = document.getElementById('inventory-list');
                lista.innerHTML = '';
                const { data: lotes, error: lotesError } = await supabaseClient.from('lotes').select('*');
                if (lotesError) throw lotesError;
                if (lotes && lotes.length > 0) lotes.forEach(l => window.renderLote(l.id, l.nombre, l.area, l.precio, l.estado, l.yaw, l.pitch));
                const { data: pois, error: poisError } = await supabaseClient.from('pois').select('*');
                if (poisError) throw poisError;
                if (pois && pois.length > 0) pois.forEach(p => window.renderPOI(p.id, p.content, p.yaw, p.pitch));
                if(lista.innerHTML === '') lista.innerHTML = '<p style="font-size:0.8rem;color:#666;">Inventario vacío.</p>';
            } catch (error) {
                window.mostrarError("cargarInventario", error);
            }
        }

        window.cargarLogo = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const btn = document.getElementById('btn-upload-logo-lbl');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Procesando... ⏳";
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('logo-data').value = e.target.result;
                document.getElementById('admin-logo-preview').src = e.target.result;
                document.getElementById('logo-preview-container').style.display = 'block';
                btn.innerHTML = "¡Logo Cargado! ✅";
                setTimeout(() => { btn.innerHTML = originalText; }, 3000);
            };
            reader.onerror = function(error) {
                btn.innerHTML = originalText;
                window.mostrarError("FileReader Logo", "No se pudo leer el archivo logo");
            };
            reader.readAsDataURL(file);
        };

        window.guardarTitulo = async function() {
            try {
                let titulo = document.getElementById('input-title').value;
                if(!titulo) return;
                let logoData = document.getElementById('logo-data').value;

                let tituloAguardar = logoData ? `${titulo}|LOGO:${logoData}` : titulo;

                document.getElementById('display-title').innerText = titulo;
                if (logoData) {
                    document.getElementById('display-logo').src = logoData;
                    document.getElementById('display-logo').style.display = 'block';
                } else {
                    document.getElementById('display-logo').style.display = 'none';
                }

                const { data, error: selectError } = await supabaseClient.from('configuracion').select('id').eq('id', 1).maybeSingle();
                if (selectError) throw selectError;

                if (!data) {
                    const { error: insertError } = await supabaseClient.from('configuracion').insert([{ id: 1, titulo: tituloAguardar }]);
                    if (insertError) throw insertError;
                } else {
                    const { error: updateError } = await supabaseClient.from('configuracion').update({ titulo: tituloAguardar }).eq('id', 1);
                    if (updateError) throw updateError;
                }
                alert("Proyecto guardado correctamente");
            } catch (error) {
                window.mostrarError("guardarTitulo", error);
            }
        }

        window.cambiarImagen = async function(event) {
            const btn = document.getElementById('btn-upload-lbl');
            const originalText = btn.innerHTML;
            try {
                const file = event.target.files[0];
                if (!file) return;
                btn.innerHTML = "Procesando archivo... ⏳";

                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const imageUrl = e.target.result;
                        const { data: configCheck, error: selectError } = await supabaseClient.from('configuracion').select('id').eq('id', 1).maybeSingle();
                        if (selectError) throw selectError;

                        if (!configCheck) {
                            const { error: insertError } = await supabaseClient.from('configuracion').insert([{ id: 1, imagen_url: imageUrl }]);
                            if (insertError) throw insertError;
                        } else {
                            const { error: updateError } = await supabaseClient.from('configuracion').update({ imagen_url: imageUrl }).eq('id', 1);
                            if (updateError) throw updateError;
                        }
                        viewer.setPanorama(imageUrl);
                        btn.innerHTML = "¡Imagen Actualizada! ✅";
                        setTimeout(() => { btn.innerHTML = originalText; }, 3000);
                    } catch (error) {
                        btn.innerHTML = originalText;
                        window.mostrarError("cambiarImagen (base64)", error);
                    }
                };
                reader.onerror = function(error) {
                    btn.innerHTML = originalText;
                    window.mostrarError("FileReader", "No se pudo leer el archivo");
                };
                reader.readAsDataURL(file);
            } catch (error) {
                btn.innerHTML = originalText;
                window.mostrarError("cambiarImagen", error);
            }
        }

        window.activarModo = function(tipo) {
            try {
                isAddMode = true; currentMode = tipo;
                document.getElementById('btn-add-lote').classList.toggle('btn-danger', tipo === 'lote');
                document.getElementById('btn-add-poi').classList.toggle('btn-danger', tipo === 'poi');
                document.getElementById('add-helper').innerText = "¡TOCA EL MAPA PARA UBICAR!";
            } catch (error) {
                window.mostrarError("activarModo", error);
            }
        }

        window.handleMapClick = function(e) {
            try {
                if (!isAddMode) return;
                tempCoords = { yaw: e.data.yaw, pitch: e.data.pitch };
                isAddMode = false;
                document.getElementById('btn-add-lote').classList.remove('btn-danger');
                document.getElementById('btn-add-poi').classList.remove('btn-danger');
                document.getElementById('add-helper').innerText = "Selecciona una opción arriba";
                if (currentMode === 'lote') {
                    document.getElementById('lote-nombre').value = '';
                    document.getElementById('add-modal').classList.add('active');
                } else {
                    document.getElementById('poi-texto').value = '';
                    document.getElementById('poi-modal').classList.add('active');
                }
            } catch (error) {
                window.mostrarError("handleMapClick", error);
            }
        }

        window.cerrarModales = function() {
            try {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
            } catch(error) {
                window.mostrarError("cerrarModales", error);
            }
        }

        window.guardarLote = async function() {
            try {
                const nombre = document.getElementById('lote-nombre').value || 'Lote Nuevo';
                const area = document.getElementById('lote-area').value || '0';
                const precio = document.getElementById('lote-precio').value || '0';
                const estado = document.getElementById('lote-estado').value;
                const idUnico = 'lote-' + Date.now();
                const { error } = await supabaseClient.from('lotes').insert([{ id: idUnico, nombre, area, precio, estado, yaw: tempCoords.yaw, pitch: tempCoords.pitch }]);
                if (error) throw error;
                window.renderLote(idUnico, nombre, area, precio, estado, tempCoords.yaw, tempCoords.pitch);
                window.cerrarModales();
            } catch (error) {
                window.mostrarError("guardarLote", error);
            }
        }

        window.renderLote = function(id, nombre, area, precio, estado, yaw, pitch) {
            try {
                let color = estado === 'Vendido' ? '#e74c3c' : (estado === 'Reservado' ? '#f39c12' : '#2ecc71');
                let shortName = nombre.replace(/lote\s*/i, '').trim();
                if(shortName.length > 4) shortName = shortName.substring(0, 4);

                const html = `<div class="lote-marker" style="background:${color}; box-shadow: 0 0 10px ${color};">${shortName}</div>`;
                if (markersPlugin.markers[id]) markersPlugin.updateMarker({ id, html });
                else {
                    markersPlugin.addMarker({ id, position: { yaw, pitch }, html, size: { width: 34, height: 34 }, anchor: 'center center', tooltip: { content: `<div style="text-align:center;"><strong style="color:#D4AF37">${nombre}</strong></div>`, position: 'top center' }, data: { nombre, area, precio, estado, yaw, pitch } });
                }
                const lista = document.getElementById('inventory-list');
                if(lista.innerHTML.includes('vacío')) lista.innerHTML = '';
                const existingItem = document.getElementById(`item-${id}`);
                if (existingItem) {
                    existingItem.querySelector('.status-dot').style.color = color;
                    existingItem.querySelector('.input-select').value = estado;
                } else {
                    lista.insertAdjacentHTML('beforeend', `<div class="lot-item" id="item-${id}"><div><span class="status-dot" style="color:${color}">●</span> <strong>${nombre}</strong></div><div style="display:flex; gap:5px;"><select class="input-select" style="width:auto; padding:5px; margin:0;" onchange="window.actualizarEstado('${id}', this.value)"><option value="Disponible" ${estado === 'Disponible' ? 'selected' : ''}>Disp.</option><option value="Reservado" ${estado === 'Reservado' ? 'selected' : ''}>Resrv.</option><option value="Vendido" ${estado === 'Vendido' ? 'selected' : ''}>Vend.</option></select><button class="btn-delete" onclick="window.borrarElemento('lotes', '${id}')">X</button></div></div>`);
                }
            } catch (error) {
                window.mostrarError("renderLote", error);
            }
        }

        window.actualizarEstado = async function(id, estado) {
            try {
                const { error } = await supabaseClient.from('lotes').update({ estado: estado }).eq('id', id);
                if (error) throw error;
                const marker = markersPlugin.markers[id];
                if (marker) window.renderLote(id, marker.config.data.nombre, marker.config.data.area, marker.config.data.precio, estado, marker.config.data.yaw, marker.config.data.pitch);
            } catch (error) {
                window.mostrarError("actualizarEstado", error);
            }
        }

        window.cambiarTipoPOI = function(tipo) {
            if (tipo === 'imagen') {
                document.getElementById('poi-imagen-container').style.display = 'block';
            } else {
                document.getElementById('poi-imagen-container').style.display = 'none';
            }
        }

        window.cargarLogoPOI = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('poi-img-data').value = e.target.result;
                const preview = document.getElementById('poi-img-preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.onerror = function(error) {
                window.mostrarError("FileReader POI Logo", "No se pudo leer el archivo de imagen");
            };
            reader.readAsDataURL(file);
        };

        window.guardarPOI = async function() {
            try {
                const texto = document.getElementById('poi-texto').value || 'Punto';
                const idUnico = 'poi-' + Date.now();
                const tipo = document.getElementById('poi-tipo-visual').value;
                let imgData = null;
                if (tipo === 'imagen') {
                    imgData = document.getElementById('poi-img-data').value;
                }
                const visualtype = imgData ? `IMG|${imgData}` : null;
                const newContent = visualtype ? `${visualtype}|TEXT|${texto}` : texto;
                const { error } = await supabaseClient.from('pois').insert([{ id: idUnico, content: newContent, yaw: tempCoords.yaw, pitch: tempCoords.pitch }]);
                if (error) throw error;
                window.renderPOI(idUnico, newContent, tempCoords.yaw, tempCoords.pitch);
                window.cerrarModales();
            } catch (error) {
                window.mostrarError("guardarPOI", error);
            }
        }

        window.renderPOI = function(id, content, yaw, pitch) {
            try {
                let displayText = content;
                let displayVisualType = null;
                if (content && content.startsWith('IMG|')) {
                    const parts = content.split('|TEXT|');
                    displayVisualType = parts[0];
                    displayText = parts[1] || 'Punto';
                }

                if (!markersPlugin.markers[id]) {
                    let htmlContent = `<div style="display:flex;flex-direction:column;align-items:center;"><div style="background:rgba(0,0,0,0.8);color:#fff;padding:4px 10px;border:1px solid #D4AF37;border-radius:4px;font-size:0.8rem;">${displayText}</div><div style="width:2px;height:30px;background:#fff;"></div><div style="width:12px;height:12px;background:#D4AF37;border-radius:50%;"></div></div>`;
                    if (displayVisualType && displayVisualType.startsWith('IMG|')) {
                        let imgData = displayVisualType.substring(4);
                        htmlContent = `<div style="display:flex;flex-direction:column;align-items:center;"><div style="background:rgba(0,0,0,0.8);padding:4px;border:1px solid #D4AF37;border-radius:4px;"><img src="${imgData}" style="max-width: 60px; max-height: 60px;"></div><div style="width:2px;height:30px;background:#fff;"></div><div style="width:12px;height:12px;background:#D4AF37;border-radius:50%;"></div></div>`;
                    }

                    markersPlugin.addMarker({ id, position: { yaw, pitch }, html: htmlContent, size: { width: 100, height: 100 }, anchor: 'bottom center' });
                    const lista = document.getElementById('inventory-list');
                    if(lista.innerHTML.includes('vacío')) lista.innerHTML = '';
                    lista.insertAdjacentHTML('beforeend', `<div class="lot-item" id="item-${id}"><div><span style="color:#D4AF37">★</span> <strong>${displayText}</strong></div><button class="btn-delete" onclick="window.borrarElemento('pois', '${id}')">X</button></div>`);
                }
            } catch (error) {
                window.mostrarError("renderPOI", error);
            }
        }

        window.borrarElemento = async function(tabla, id) {
            try {
                if(!confirm("¿Borrar?")) return;
                const { error } = await supabaseClient.from(tabla).delete().eq('id', id);
                if (error) throw error;
                markersPlugin.removeMarker(id);
                const item = document.getElementById(`item-${id}`);
                if (item) item.remove();
            } catch (error) {
                window.mostrarError("borrarElemento", error);
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
