<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interesados - Rincón de Baviera</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: #fff;
            background-image: radial-gradient(circle at top right, rgba(242, 101, 34, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(242, 101, 34, 0.1), transparent 40%);
            min-height: 100vh;
        }

        .header {
            background: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(242, 101, 34, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #f26522;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 600;
            color: #f26522;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .leads-table-container {
            background: rgba(17, 17, 17, 0.45);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(242, 101, 34, 0.2);
            border-radius: 16px;
            overflow-x: auto;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            background: rgba(242, 101, 34, 0.1);
            padding: 15px 20px;
            text-align: left;
            font-size: 0.85rem;
            color: #f26522;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(242, 101, 34, 0.3);
        }

        td {
            padding: 15px 20px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ddd;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
        }

        .btn-action {
            background: rgba(37, 211, 102, 0.2);
            color: #25D366;
            border: 1px solid #25D366;
            padding: 6px 12px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .btn-action:hover {
            background: #25D366;
            color: #000;
        }

        .btn-action svg {
            width: 14px;
            height: 14px;
        }

        .badge {
            background: rgba(242, 101, 34, 0.15);
            color: #f26522;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #f26522;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .btn-export {
            background: #f26522;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            transition: opacity 0.3s;
        }

        .btn-export:hover {
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Gestión de Interesados</h1>
        <button class="btn-export" onclick="exportToCSV()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Exportar CSV
        </button>
    </div>

    <div class="container">

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-leads">0</div>
                <div class="stat-label">Total Interesados</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lotes-interes">0</div>
                <div class="stat-label">Lotes con Interés</div>
            </div>
        </div>

        <div class="leads-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Contacto</th>
                        <th>Lote Interés</th>
                        <th>Propuesta</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    <tr><td colspan="6" class="loading">Cargando datos...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://mungbffwwjobinfcympd.supabase.co';
        const supabaseKey = 'sb_publishable_yW5gsHp1w8ElbWRTeoMJYw_ZC-u0j9e';
        let supabaseClient;
        let allLeads = [];

        async function init() {
            try {
                supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
                await fetchLeads();
            } catch (error) {
                console.error("Error init:", error);
                document.getElementById('leads-body').innerHTML = `<tr><td colspan="6" style="text-align:center; color:#e74c3c; padding:30px;">Error al conectar con la base de datos.</td></tr>`;
            }
        }

        async function fetchLeads() {
            const { data, error } = await supabaseClient
                .from('interesados')
                .select('*')
                .order('fecha', { ascending: false });

            if (error) {
                console.error("Error fetching leads:", error);
                document.getElementById('leads-body').innerHTML = `<tr><td colspan="6" style="text-align:center; color:#e74c3c; padding:30px;">Error al cargar los datos. Verifica que la tabla exista.</td></tr>`;
                return;
            }

            allLeads = data || [];
            updateUI();
        }

        function updateUI() {
            document.getElementById('total-leads').innerText = allLeads.length;

            const lotesUnicos = new Set(allLeads.map(l => l.lote));
            document.getElementById('lotes-interes').innerText = lotesUnicos.size;

            const tbody = document.getElementById('leads-body');
            tbody.innerHTML = '';

            if (allLeads.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#aaa; padding:30px;">No hay interesados registrados aún.</td></tr>`;
                return;
            }

            allLeads.forEach(lead => {
                const date = new Date(lead.fecha);
                const dateStr = date.toLocaleDateString('es-CO') + ' ' + date.toLocaleTimeString('es-CO', {hour: '2-digit', minute:'2-digit'});

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${dateStr}</td>
                    <td>
                        <strong style="color: #fff;">${lead.nombre}</strong><br>
                        <span style="font-size: 0.8rem; color: #888;">${lead.direccion || 'Sin dirección'}</span>
                    </td>
                    <td>
                        ${lead.telefono}<br>
                        <span style="font-size: 0.8rem; color: #888;">${lead.correo || 'Sin correo'}</span>
                    </td>
                    <td><span class="badge">${lead.lote}</span></td>
                    <td>
                        <div style="font-size: 0.85rem;">
                            C. Inicial: <strong style="color: #f26522;">${lead.cuota_inicial}</strong><br>
                            Plazo: <strong>${lead.meses} meses</strong>
                        </div>
                    </td>
                    <td>
                        <a href="https://wa.me/57${lead.telefono.replace(/\\D/g, '')}?text=Hola%20${encodeURIComponent(lead.nombre)},%20te%20contacto%20de%20Rinc%C3%B3n%20de%20Baviera%20respecto%20a%20tu%20inter%C3%A9s%20en%20el%20lote%20${encodeURIComponent(lead.lote)}." target="_blank" class="btn-action">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                            Contactar
                        </a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportToCSV() {
            if(allLeads.length === 0) return alert("No hay datos para exportar.");

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Fecha,Nombre,Telefono,Correo,Direccion,Lote,Cuota Inicial,Meses\n";

            allLeads.forEach(lead => {
                const date = new Date(lead.fecha).toLocaleDateString('es-CO');
                const row = [
                    date,
                    `"${lead.nombre}"`,
                    `"${lead.telefono}"`,
                    `"${lead.correo}"`,
                    `"${lead.direccion}"`,
                    `"${lead.lote}"`,
                    `"${lead.cuota_inicial}"`,
                    lead.meses
                ].join(",");
                csvContent += row + "\r\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "interesados_rincon_de_baviera.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = init;
    </script>
</body>
</html>
