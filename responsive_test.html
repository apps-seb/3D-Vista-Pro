<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #0f0f0f; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #1a1a1a; padding: 20px; }
        .viewer-wrapper { flex: 1; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 50%; padding: 10px; box-sizing: border-box; }
            .viewer-wrapper { height: 50%; }
        }
    </style>
</head>
<body>
    <div class="sidebar">Sidebar</div>
    <div class="viewer-wrapper">Viewer</div>
</body>
</html>
