<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Rincón de Baviera</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(242, 101, 34, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(242, 101, 34, 0.1), transparent 40%);
        }

        .login-container {
            background: rgba(17, 17, 17, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(242, 101, 34, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f26522, #ff8c00);
        }

        .logo-container {
            margin-bottom: 30px;
        }

        /* Utiliza un SVG o un div estético si no hay logo disponible, en este caso creamos algo estético */
        .logo-placeholder {
            width: 60px;
            height: 60px;
            background: rgba(242, 101, 34, 0.1);
            border: 2px solid #f26522;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px auto;
        }

        .logo-placeholder svg {
            width: 30px;
            height: 30px;
            stroke: #f26522;
        }

        .login-title {
            color: #f26522;
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .login-subtitle {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #ccc;
            font-size: 0.8rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #f26522;
            box-shadow: 0 0 10px rgba(242, 101, 34, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f26522, #ff8c00);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        @media (hover: hover) {
            .btn-login:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(242, 101, 34, 0.4);
            }
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            background: rgba(231, 76, 60, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        /* Loader global */
        #global-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: #f26522;
            width: 0%;
            z-index: 9999;
            transition: width 0.3s, opacity 0.3s;
            opacity: 0;
            box-shadow: 0 0 10px #f26522;
        }
    </style>
</head>
<body>
    <div id="global-progress"></div>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo-placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h1 class="login-title">Acceso Restringido</h1>
            <p class="login-subtitle">Inicia sesión para administrar los proyectos</p>
        </div>

        <form id="login-form">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" class="input-field" placeholder="tu@correo.com" required autocomplete="email">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="btn-submit" class="btn-login">Ingresar</button>
        </form>

        <div id="error-msg" class="error-message"></div>

        <div style="margin-top: 20px; font-size: 0.75rem; color: #666;">
            Si necesitas acceso, contacta al administrador del sistema.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://mungbffwwjobinfcympd.supabase.co';
        const supabaseKey = 'sb_publishable_yW5gsHp1w8ElbWRTeoMJYw_ZC-u0j9e';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        function mostrarProgreso(porcentaje) {
            const bar = document.getElementById('global-progress');
            bar.style.opacity = '1';
            bar.style.width = porcentaje + '%';
            if (porcentaje >= 100) {
                setTimeout(() => {
                    bar.style.opacity = '0';
                    setTimeout(() => { bar.style.width = '0%'; }, 300);
                }, 500);
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnSubmit = document.getElementById('btn-submit');

            if (!email || !password) return;

            document.getElementById('error-msg').style.display = 'none';
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = 'Verificando... ⏳';
            mostrarProgreso(30);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    throw error;
                }

                mostrarProgreso(100);
                btnSubmit.innerHTML = '¡Éxito! Redirigiendo... ✅';

                // Redirigir al admin después de login exitoso
                setTimeout(() => {
                    const params = new URLSearchParams(window.location.search);
                    const redirectTo = params.get('redirect') || 'admin.html';
                    window.location.href = redirectTo;
                }, 1000);

            } catch (error) {
                mostrarProgreso(100);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'Ingresar';

                let errorMsg = 'Error al iniciar sesión.';
                if (error.message.includes('Invalid login credentials')) {
                    errorMsg = 'Correo o contraseña incorrectos.';
                } else if (error.message.includes('Email not confirmed')) {
                    errorMsg = 'Por favor, confirma tu correo electrónico primero.';
                } else {
                    errorMsg = error.message;
                }

                showError(errorMsg);
            }
        });

        // Verificar si ya está logueado al cargar
        async function checkSession() {
            mostrarProgreso(10);
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const params = new URLSearchParams(window.location.search);
                const redirectTo = params.get('redirect') || 'admin.html';
                window.location.href = redirectTo;
            } else {
                mostrarProgreso(100);
            }
        }

        checkSession();
    </script>
</body>
</html>
